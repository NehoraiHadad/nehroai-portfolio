<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none">
  <rect width="96" height="96" rx="22" fill="#050E22"/>
  <rect x="10" y="10" width="76" height="76" rx="18" fill="#0A1735" stroke="#2A3D78" stroke-width="2"/>
  <g transform="translate(10 12) scale(0.15)">
<defs>
    <linearGradient id="nFill" x1="61" y1="111" x2="259" y2="395" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.42" stop-color="#EEF2FB"/>
      <stop offset="0.72" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#D9E0EF"/>
    </linearGradient>
    <linearGradient id="stemFill" x1="314" y1="175" x2="370" y2="421" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3C8CFF"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D56D9"/>
    </linearGradient>
    <radialGradient id="dotFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(342 115) rotate(90) scale(36)">
      <stop offset="0" stop-color="#F0FCFF"/>
      <stop offset="0.58" stop-color="#BAEFFE"/>
      <stop offset="1" stop-color="#83DDF5"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(342 116) rotate(90) scale(106)">
      <stop offset="0" stop-color="#BAEFFE" stop-opacity="0.72"/>
      <stop offset="0.32" stop-color="#2563EB" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="33" y="84" width="388" height="366" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#00091C" flood-opacity="0.44"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#FFFFFF" flood-opacity="0.12"/>
    </filter>
    <filter id="dotBloom" x="218" y="-10" width="248" height="248" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.88  0 0 0 0 1  0 0 0 0.85 0" result="bloom"/>
      <feMerge>
        <feMergeNode in="bloom"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <clipPath id="nClip">
      <path d="M58 421V111H126L287 352V421H226L126 270V421H58Z"/>
    </clipPath>
  </defs>

  <g transform="translate(43 0)">
  <g filter="url(#softShadow)">
    <g clip-path="url(#nClip)">
      <rect x="58" y="111" width="229" height="310" fill="url(#nFill)"/>
      <path d="M86 122L246 421H214L61 137V111H126L287 352V376L104 111H126Z" fill="#FFFFFF" opacity="0.2"/>
      <rect x="73" y="123" width="10" height="285" fill="#FFFFFF" opacity="0.35"/>
      <path d="M58 421V111H126L287 352V421H226L126 270V421H58Z" filter="url(#paperGrain)" opacity="0.52"/>
    </g>

    <rect x="311" y="175" width="57" height="246" rx="10" fill="url(#stemFill)"/>
    <rect x="321" y="185" width="12" height="224" rx="6" fill="#65A0FF" opacity="0.24"/>
    <rect x="311" y="175" width="57" height="246" rx="10" stroke="#6DA5FF" stroke-opacity="0.26" stroke-width="2"/>
  </g>

  <g filter="url(#dotBloom)">
    <circle cx="342" cy="115" r="86" fill="url(#blueGlow)"/>
    <circle cx="342" cy="115" r="42" fill="#BAEFFE" opacity="0.2"/>
    <circle cx="342" cy="115" r="31" fill="url(#dotFill)"/>
    <circle cx="332" cy="104" r="10" fill="#FFFFFF" opacity="0.46"/>
  </g>
  </g>
  </g>
